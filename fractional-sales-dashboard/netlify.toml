# Netlify config for Next.js (fractional-sales-dashboard)
# Next.js 16 is supported with zero config; Netlify uses OpenNext automatically.

[build]
  command = "npm run build"
  # If this repo is the dashboard only, leave as-is.
  # If deploying from a monorepo, set base = "fractional-sales-dashboard" in the Netlify UI instead.

[build.environment]
  NODE_VERSION = "20"

# Required in Netlify UI (Site settings → Environment variables):
#   SESSION_SECRET = long random string (e.g. openssl rand -hex 32)
#   NEXT_PUBLIC_BASE_PATH = /app   (so app is served at www.revpro.io/app when proxied)
