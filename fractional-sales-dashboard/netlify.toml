# Netlify config for Next.js (fractional-sales-dashboard)
# Next.js 16: Netlify uses OpenNext; we force the plugin so SSR works.

[build]
  command = "npm run build"
  # Must differ from base directory (UI may lock publish to base; this overrides)
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# Ensure Next.js runtime is used (handles dynamic routes)
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Redirect site root to /app so https://revpro-dashboard.netlify.app/ doesn't 404
[[redirects]]
  from = "/"
  to = "/app"
  status = 302
  force = true

# Required in Netlify UI (Site settings → Environment variables):
#   SESSION_SECRET = long random string (e.g. openssl rand -hex 32)
#   NEXT_PUBLIC_BASE_PATH = /app   (so app is served at www.revpro.io/app when proxied)
